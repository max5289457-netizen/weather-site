    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Weather Pulse",
        "url": "https://weather-site-ten-beryl.vercel.app/",
        "description": "Сервис прогноза погоды онлайн для городов и регионов.",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://weather-site-ten-beryl.vercel.app/?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
  </head>
  <body>
    <script>
      ;(function () {
        const params = new URLSearchParams(window.location.search)
        const redirect = params.get('redirect')

        if (redirect) {
          const normalized = redirect.replace(/^\/+/, '')
          const basePath = window.location.pathname.includes('/weather-site/')
            ? '/weather-site'
            : ''
          const target = normalized ? `${basePath}/${normalized}` : `${basePath}/`
          window.history.replaceState(null, '', target || '/')
        }
      })()
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
